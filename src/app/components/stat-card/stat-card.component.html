<p-card styleClass="stat-card">

    <div class="card-content">

        <div class="icon"
             [style.background]="color">

            <i [class]="icon"></i>

        </div>

        <div>

            <div class="title">

                {{title}}

            </div>

            <div class="value">

                {{value}}

            </div>

        </div>

    </div>

</p-card>
