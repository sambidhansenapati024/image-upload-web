<div class="cloud-card">
    <h3>Personal Information</h3>

    <div class="info-row">

        <div class="label">
            <i class="pi pi-user"></i>
            <span>Full Name</span>
        </div>

        <div class="value">
           {{profile.fullName}}
        </div>

    </div>

    <div class="info-row">

        <div class="label">
            <i class="pi pi-envelope"></i>
            <span>Email</span>
        </div>

        <div class="value">
            {{profile.email}}
        </div>

    </div>

    <div class="info-row">

        <div class="label">
            <i class="pi pi-phone"></i>
            <span>Phone</span>
        </div>

        <div class="value">
           {{ profile.phone || '-' }}
        </div>

    </div>

    <div class="info-row">

        <div class="label">
            <i class="pi pi-calendar"></i>
            <span>Joined</span>
        </div>

        <div class="value">
            {{ profile.joinedOn | date:'dd MMM yyyy' }}
        </div>

    </div>

</div>
