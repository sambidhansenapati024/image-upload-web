<p-card styleClass="navbar-card">

    <p-confirmDialog></p-confirmDialog>
    <p-toast></p-toast>

    <div class="navbar">

        <!-- Right Section -->
        <div class="right">

            <p-tag
                severity="success"
                value="Connected">
            </p-tag>

            <p-tag
                severity="info"
                [value]="version">
            </p-tag>

            <div class="user">

                <div class="avatar">
                    S
                </div>

                <div>

                    <h4>Sambidhan</h4>

                    <small>Software Engineer</small>

                </div>

            </div>

            <p-button
                icon="pi pi-sign-out"
                severity="danger"
                [rounded]="true"
                [text]="true"
                (onClick)="logout()">
            </p-button>

        </div>

    </div>

</p-card>
