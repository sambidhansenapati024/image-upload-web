<div class="profile-page">

<app-profile-header
    *ngIf="profile"
    [profile]="profile"
    (editProfile)="openEditDialog()"
    (imageSelected)="uploadProfileImage($event)">
</app-profile-header>

<div class="profile-grid">

    <app-profile-info-card
        *ngIf="profile"
        [profile]="profile">
    </app-profile-info-card>

    <app-storage-stats-card>
    </app-storage-stats-card>

</div>
</div>

<app-profile-edit-dialog
    *ngIf="profile"
    [visible]="showEditDialog"
    [profile]="profile"
    (visibleChange)="showEditDialog = $event"
    (save)="updateProfile($event)">
</app-profile-edit-dialog>
